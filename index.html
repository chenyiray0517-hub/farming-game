<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌾 農場遊戲</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">

    <!-- ── HUD ── -->
    <div class="hud">
      <div class="hud-row hud-row1">
        <span class="day-display"   id="day-display">第 1 天</span>
        <span class="coins-display" id="coins-display">💰 100</span>
        <span class="level-display" id="level-display">⭐ Lv.1 新農夫</span>
        <div class="hud-badges">
          <span class="season-display"  id="season-display">🌸 春</span>
          <span class="weather-display" id="weather-display">☀️ 晴天</span>
          <span class="pet-badge" id="pet-badge"></span>
        </div>
      </div>
      <div class="hud-row hud-row2">
        <div class="xp-bar-wrap">
          <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
          <span class="xp-text" id="xp-text">0/100 XP</span>
        </div>
        <button class="pet-fab" id="pet-fab">🐾<span class="pet-fab-dot hidden" id="pet-fab-dot"></span></button>
      </div>
    </div>

    <!-- ── Main Area (farm + sidebar on desktop) ── -->
    <div class="main-area">

      <!-- Left: Farm + Toolbar + Log -->
      <div class="farm-side">

        <!-- Farm -->
        <div class="farm-container">
          <div class="farm-grid" id="farm-grid"></div>
        </div>

        <!-- Log Strip (latest entry only on mobile, full log on desktop) -->
        <div class="log-strip">
          <div class="activity-log" id="activity-log"></div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <button class="tool-btn active" id="tool-seed"    data-tool="seed">🌱 種植</button>
          <button class="tool-btn"        id="tool-water"   data-tool="water">💧 澆水</button>
          <button class="tool-btn"        id="tool-harvest" data-tool="harvest">🌾 收穫</button>
          <div class="toolbar-meta">
            <span class="selected-info" id="selected-info">請選種子</span>
            <span class="day-timer timer-ok" id="day-timer">⏱️ 2:00</span>
          </div>
        </div>

      </div><!-- /farm-side -->

    <!-- ── Bottom Panel ── -->
    <div class="bottom-panel">

      <!-- Tab Bar (includes 結束今天) -->
      <div class="tab-group">
        <button class="tab-btn active" data-tab="shop">🏪 商店</button>
        <button class="tab-btn"        data-tab="inventory">🏠 倉庫</button>
        <button class="tab-btn"        data-tab="quests">📋 任務</button>
        <button class="next-day-btn"   id="next-day-btn">🌅 結束</button>
      </div>

      <!-- Scrollable panel content -->
      <div class="panels-scroll">

        <!-- Shop Panel -->
        <div class="panel" id="panel-shop">
          <div class="panel-hint">選好種子後點擊農地種植</div>
          <div class="seed-list" id="seed-list"></div>
        </div>

        <!-- Inventory Panel -->
        <div class="panel hidden" id="panel-inventory">
          <div class="inv-header">
            <span class="panel-hint">收穫的作物存放於此</span>
            <button class="sell-all-btn" id="sell-all-btn">全部出售</button>
          </div>
          <div class="inv-grid" id="inv-grid"></div>
          <div class="inv-empty" id="inv-empty">倉庫是空的</div>
        </div>

        <!-- Quests Panel -->
        <div class="panel hidden" id="panel-quests">
          <div class="panel-hint">每日任務（每天重置）</div>
          <div class="quest-list" id="quest-list"></div>
          <div class="achievement-title">🏆 成就</div>
          <div class="achievement-list" id="achievement-list"></div>
          <!-- Redeem codes -->
          <div class="redeem-section" id="redeem-section">
            <div class="stats-title">🎁 兌換碼</div>
            <div class="redeem-row">
              <input class="redeem-input" id="redeem-input" type="text" placeholder="輸入兌換碼…" autocomplete="off" />
              <button class="redeem-btn" id="redeem-btn">兌換</button>
            </div>
          </div>

          <!-- Stats & Reset (tucked inside quests) -->
          <div class="stats-panel">
            <div class="stats-title">📊 統計</div>
            <div id="stats-content"></div>
          </div>
          <div class="action-panel">
            <button class="reset-btn" id="reset-btn">🔄 重置遊戲</button>
          </div>
        </div>

      </div><!-- /panels-scroll -->
    </div><!-- /bottom-panel -->

    </div><!-- /main-area -->

  </div><!-- /game-wrapper -->

  <!-- ── Pet Bottom Sheet ── -->
  <div class="pet-sheet-bg" id="pet-sheet-bg"></div>
  <div class="pet-sheet" id="pet-sheet">
    <div class="pet-sheet-handle"></div>
    <div class="pet-sheet-header">
      <span class="pet-sheet-title">🐾 寵物</span>
      <button class="pet-sheet-close" id="pet-sheet-close">✕</button>
    </div>
    <div class="pet-sheet-body" id="pet-sheet-body"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-emo"   id="modal-emo"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-btns" id="modal-btns"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
